<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMED Documents</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 500px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-text { color: #004691; font-weight: bold; font-size: 22px; line-height: 1.1; }
        .logo-sub { color: #007bff; font-size: 14px; font-weight: normal; }
        .lang-flag { width: 24px; border-radius: 50%; border: 1px solid #eee; }

        .main { margin-top: 40px; text-align: center; width: 100%; max-width: 400px; }
        h2 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 30px; line-height: 1.3; }

        .pin-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 35px; }
        .pin-input { 
            width: 60px; height: 50px; border: 1px solid #e0e0e0; border-radius: 12px; 
            text-align: center; font-size: 24px; outline: none; background: #fff;
        }
        .btn-open { 
            width: 90%; height: 52px; background: #f8f9fa; color: #d0d0d0; 
            border: 1px solid #f0f0f0; border-radius: 8px; font-size: 18px; cursor: not-allowed;
        }
        .btn-active { background: #fff !important; color: #007bff !important; border: 1px solid #007bff !important; cursor: pointer; }

        /* Pastki qism (Rasmdagi instruksiya) */
        .instruction-box {
            margin-top: 80px; width: 90%; max-width: 450px; background: #f2f4f7; 
            border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px;
        }
        .instr-img { width: 150px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .instr-text { font-size: 13px; color: #666; line-height: 1.4; text-align: left; }
        .blue-hint { background: #d0e4ff; color: #000; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 22px; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-box">
            <img src="https://dmed.uz" width="35">
            <div><div class="logo-text">DMED</div><div class="logo-sub">Documents</div></div>
        </div>
        <img src="https://wikimedia.org" class="lang-flag">
    </div>

    <div class="main">
        <h2>Введите PIN-код для просмотра<br>документа</h2>
        <form method="POST">
            <div class="pin-container">
                <input type="text" name="p1" id="p1" maxlength="1" class="pin-input" oninput="if(this.value)document.getElementById('p2').focus()">
                <input type="text" name="p2" id="p2" maxlength="1" class="pin-input" oninput="if(this.value)document.getElementById('p3').focus()">
                <input type="text" name="p3" id="p3" maxlength="1" class="pin-input" oninput="if(this.value)document.getElementById('p4').focus()">
                <input type="text" name="p4" id="p4" maxlength="1" class="pin-input" oninput="ck()">
            </div>
            <button type="submit" id="btn" class="btn-open">Открыть</button>
        </form>
    </div>

    <div class="instruction-box">
        <img src="https://ibb.co" class="instr-img" alt="Manual">
        <div>
            <div class="instr-text">PIN-код размещается<br>рядом с QR-кодом<br>документа</div>
            <div class="blue-hint">1234</div>
        </div>
    </div>

    <script>
        function ck() { if(document.getElementById('p4').value) document.getElementById('btn').classList.add('btn-active'); }
    </script>
</body>
</html>
